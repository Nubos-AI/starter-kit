stages:
  - split

split:starter-kit:
  stage: split
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh-client jq bash
    - wget -qO /usr/local/bin/splitsh-lite https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64
    - chmod +x /usr/local/bin/splitsh-lite
    - mkdir -p ~/.ssh
    - cp "$GITHUB_DEPLOY_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.name "Nubos CI"
    - git config --global user.email "ci@nubos.cloud"
  script: |
    VERSION="${CI_COMMIT_TAG##*/}"

    SHA=$(splitsh-lite \
      --prefix="libs/laravel/nubos-starter-kit" \
      --without="packages/")

    git checkout -b _split "$SHA"

    jq '.repositories = [.repositories[] | select(.type != "path")]' composer.json > composer.json.tmp
    mv composer.json.tmp composer.json
    rm -f composer.lock

    git add composer.json
    git rm --cached composer.lock 2>/dev/null || true
    git commit --amend --no-edit

    git remote add github git@github.com:Nubos-AI/starter-kit.git
    git push github _split:main --force
    git tag "$VERSION"
    git push github "$VERSION"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^starter-kit\/v\d+/'

split:package:
  stage: split
  image: alpine:latest
  before_script:
    - apk add --no-cache git openssh-client bash
    - wget -qO /usr/local/bin/splitsh-lite https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64
    - chmod +x /usr/local/bin/splitsh-lite
    - mkdir -p ~/.ssh
    - ssh-keyscan -p 2222 gitlab.nubos.cloud >> ~/.ssh/known_hosts
    - git config --global user.name "Nubos CI"
    - git config --global user.email "ci@nubos.cloud"
  script: |
    TAG="${CI_COMMIT_TAG}"
    PKG="${TAG%%/*}"
    VERSION="${TAG##*/}"

    SHA=$(splitsh-lite --prefix="libs/laravel/nubos-starter-kit/packages/nubos/$PKG")

    git remote add split "ssh://git@gitlab.nubos.cloud:2222/nubos/$PKG.git"
    git push split "$SHA:refs/heads/main" --force
    git tag "$VERSION" "$SHA"
    git push split "$VERSION"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^init\/v\d+/'

